# ═══════════════════════════════════════════════
# Configuración del Proyecto Big Data Finanzas
# ═══════════════════════════════════════════════

# Rutas de datos (arquitectura medallion)
paths:
  bronze: "data/bronze/datos_raw.csv"
  silver: "data/silver/datos_silver.parquet"
  gold: "data/gold/datos_gold.parquet"
  resultados: "data/gold/backtesting_resultados.csv"

# Parámetros de indicadores técnicos
indicadores:
  sma_corto: 20
  sma_largo: 50
  rsi_periodo: 14

# Parámetros de señales
senales:
  rsi_sobrecompra: 70
  rsi_sobreventa: 30

# Clasificación de activos por sufijo del ticker
clasificacion:
  IBEX35: ".MC"
  CRYPTO: "-USD"
  CHINA_SS: ".SS"
  CHINA_SZ: ".SZ"
  CHINA_HK: ".HK"
  SP500: "default"
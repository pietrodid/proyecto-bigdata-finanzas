# Configuracion del Proyecto Big Data Finanzas

# Rutas de datos (arquitectura medallion)
paths:
  bronze: "data/bronze/datos_raw.csv"
  silver: "data/silver/stock_silver"
  gold: "data/gold/stock_gold"
  resultados: "data/gold/backtesting_resultados"

# Parametros de indicadores tecnicos
indicadores:
  sma_corto: 20
  sma_largo: 50
  rsi_periodo: 14

# Parametros de senales
senales:
  rsi_sobrecompra: 70
  rsi_sobreventa: 30

# Clasificacion de activos por sufijo del ticker
clasificacion:
  IBEX35: ".MC"
  CRYPTO: "-USD"
  CHINA_SS: ".SS"
  CHINA_SZ: ".SZ"
  CHINA_HK: ".HK"
  SP500: "default"